apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: apps
  labels:
    app.kubernetes.io/managed-by: endfield
    endfield.io/component: postgres
    endfield.io/fieldId: postgres
    endfield.io/resourceRole: statefulset
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      endfield.io/fieldId: postgres
  template:
    metadata:
      labels:
        app: postgres
        endfield.io/fieldId: postgres
        endfield.io/component: postgres
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: postgres-credentials
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/managed-by: endfield
          endfield.io/component: postgres
          endfield.io/fieldId: postgres
          endfield.io/resourceRole: pvc
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
