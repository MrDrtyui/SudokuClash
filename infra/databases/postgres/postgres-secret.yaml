apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: apps
  labels:
    app.kubernetes.io/managed-by: endfield
    endfield.io/component: postgres
    endfield.io/fieldId: postgres
    endfield.io/resourceRole: secret
type: Opaque
stringData:
  POSTGRES_DB: "appdb"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "changeme"
  DATABASE_URL: "postgresql://postgres:changeme@postgres.apps.svc.cluster.local:5432/appdb?sslmode=disable"
